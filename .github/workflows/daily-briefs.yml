name: Daily Tech Briefs

on:
  schedule:
    # Run at 6:00 AM UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Topics to generate (comma-separated: dotnet,ai,cloud,dev)'
        required: false
        default: 'dotnet,ai,cloud,dev'
      language:
        description: 'Language (en, he, both)'
        required: false
        default: 'both'

jobs:
  generate-briefs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install feedparser edge-tts Pillow moviepy
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Hebrew fonts
        run: |
          sudo apt-get install -y fonts-noto fonts-noto-extra

      - name: Generate English briefs
        run: |
          cd pipeline/daily-briefs
          DATE=$(date +%Y-%m-%d)
          for topic in dotnet ai cloud dev; do
            python fetch_news.py $topic $DATE
            BRIEF="output/$DATE/$topic-brief.json"
            if [ -f "$BRIEF" ]; then
              python generate_brief_video.py "$BRIEF"
            fi
          done

          # Weekly topics on Sunday
          if [ "$(date +%u)" = "7" ]; then
            for topic in security gamedev; do
              python fetch_news.py $topic $DATE
              BRIEF="output/$DATE/$topic-brief.json"
              if [ -f "$BRIEF" ]; then
                python generate_brief_video.py "$BRIEF"
              fi
            done
          fi

      - name: Generate Hebrew briefs
        if: inputs.language == 'both' || inputs.language == 'he'
        run: |
          cd pipeline/daily-briefs
          DATE=$(date +%Y-%m-%d)
          for topic in dotnet ai cloud dev; do
            python fetch_news.py "${topic}-he" $DATE --config topics_he.json || true
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefs-${{ github.run_number }}
          path: pipeline/daily-briefs/output/
          retention-days: 30

      - name: Upload to YouTube
        if: env.YOUTUBE_REFRESH_TOKEN != ''
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_PLAYLIST_DOTNET: ${{ secrets.YT_PLAYLIST_DOTNET }}
          YT_PLAYLIST_AI: ${{ secrets.YT_PLAYLIST_AI }}
          YT_PLAYLIST_CLOUD: ${{ secrets.YT_PLAYLIST_CLOUD }}
          YT_PLAYLIST_DEV: ${{ secrets.YT_PLAYLIST_DEV }}
          YT_PLAYLIST_SECURITY: ${{ secrets.YT_PLAYLIST_SECURITY }}
          YT_PLAYLIST_GAMEDEV: ${{ secrets.YT_PLAYLIST_GAMEDEV }}
        run: |
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2
          DATE=$(date +%Y-%m-%d)
          cd pipeline/daily-briefs
          python upload_to_youtube.py --date "$DATE" --delay 30

  weekly-summary:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 0'  # Only on Sundays
    needs: generate-briefs

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate weekly summary
        run: |
          pip install feedparser edge-tts Pillow moviepy
          cd pipeline/daily-briefs
          python generate_weekly_summary.py
