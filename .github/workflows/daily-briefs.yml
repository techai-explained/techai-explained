name: Daily Tech Briefs

on:
  schedule:
    # Run at 6:00 AM UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Topics to generate (comma-separated: dotnet,ai,cloud,dev)'
        required: false
        default: 'dotnet,ai,cloud,dev'
      language:
        description: 'Language (en, he, both)'
        required: false
        default: 'both'

jobs:
  generate-briefs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set date
        id: set-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install feedparser edge-tts Pillow moviepy
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Hebrew fonts
        run: |
          sudo apt-get install -y fonts-noto fonts-noto-extra

      - name: Generate English briefs
        run: |
          cd pipeline/daily-briefs
          DATE=$(date +%Y-%m-%d)
          for topic in dotnet ai cloud dev; do
            python fetch_news.py $topic $DATE
            BRIEF="output/$DATE/$topic-brief.json"
            if [ -f "$BRIEF" ]; then
              python generate_brief_video.py "$BRIEF"
            fi
          done

          # Weekly topics on Sunday
          if [ "$(date +%u)" = "7" ]; then
            for topic in security gamedev; do
              python fetch_news.py $topic $DATE
              BRIEF="output/$DATE/$topic-brief.json"
              if [ -f "$BRIEF" ]; then
                python generate_brief_video.py "$BRIEF"
              fi
            done
          fi

      - name: Generate Hebrew briefs
        if: ${{ inputs.language != 'en' }}
        run: |
          cd pipeline/daily-briefs
          DATE=$(date +%Y-%m-%d)
          for topic in dotnet ai cloud dev; do
            python fetch_news.py "${topic}-he" $DATE --config topics_he.json || true
            BRIEF="output/$DATE/${topic}-he-brief.json"
            if [ -f "$BRIEF" ]; then
              python generate_brief_video.py "$BRIEF" --language he
            fi
          done
          
          # Weekly Hebrew topics on Sunday
          if [ "$(date +%u)" = "7" ]; then
            for topic in security gamedev; do
              python fetch_news.py "${topic}-he" $DATE --config topics_he.json || true
              BRIEF="output/$DATE/${topic}-he-brief.json"
              if [ -f "$BRIEF" ]; then
                python generate_brief_video.py "$BRIEF" --language he
              fi
            done
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # Named by date so the upload-youtube workflow can locate them
          name: daily-briefs-${{ steps.set-date.outputs.date }}
          path: pipeline/daily-briefs/output/
          retention-days: 30
          overwrite: true

  weekly-summary:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 0'  # Only on Sundays
    needs: generate-briefs

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate weekly summary
        run: |
          pip install feedparser edge-tts Pillow moviepy
          cd pipeline/daily-briefs
          python generate_weekly_summary.py
